name: Deploy adk.jamjet.dev to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'adk/**'
  workflow_dispatch:

concurrency:
  group: pages-adk
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy adk.jamjet.dev
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: adk/package-lock.json

      - name: Install dependencies
        run: cd adk && npm ci

      - name: Build site
        run: cd adk && npm run build

      - name: Create Pages project (idempotent)
        run: npx wrangler pages project create adk-jamjet-dev --production-branch=main 2>/dev/null || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy adk/dist --project-name=adk-jamjet-dev
