<svg width="200" height="48" viewBox="0 0 200 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Pixel art "J bolt" icon: 6x8 pixel grid, each pixel = 5px -->
  <g transform="translate(0,4)">
    <!-- Row 0: _ _ X X _ _ -->
    <rect x="10" y="0"  width="5" height="5" fill="#f5c518"/>
    <rect x="15" y="0"  width="5" height="5" fill="#f5c518"/>
    <!-- Row 1: _ X X X X _ -->
    <rect x="5"  y="5"  width="5" height="5" fill="#f5c518"/>
    <rect x="10" y="5"  width="5" height="5" fill="#f5c518"/>
    <rect x="15" y="5"  width="5" height="5" fill="#f5c518"/>
    <rect x="20" y="5"  width="5" height="5" fill="#f5c518"/>
    <!-- Row 2: _ _ X X _ _ -->
    <rect x="10" y="10" width="5" height="5" fill="#f5c518"/>
    <rect x="15" y="10" width="5" height="5" fill="#f5c518"/>
    <!-- Row 3: _ _ X X _ _ -->
    <rect x="10" y="15" width="5" height="5" fill="#f5c518"/>
    <rect x="15" y="15" width="5" height="5" fill="#f5c518"/>
    <!-- Row 4: X X X X _ _ -->
    <rect x="0"  y="20" width="5" height="5" fill="#f5c518"/>
    <rect x="5"  y="20" width="5" height="5" fill="#f5c518"/>
    <rect x="10" y="20" width="5" height="5" fill="#f5c518"/>
    <rect x="15" y="20" width="5" height="5" fill="#f5c518"/>
    <!-- Row 5: _ X X X X X -->
    <rect x="5"  y="25" width="5" height="5" fill="#f5c518"/>
    <rect x="10" y="25" width="5" height="5" fill="#f5c518"/>
    <rect x="15" y="25" width="5" height="5" fill="#f5c518"/>
    <rect x="20" y="25" width="5" height="5" fill="#f5c518"/>
    <rect x="25" y="25" width="5" height="5" fill="#f5c518"/>
    <!-- Row 6: _ _ X X _ _ -->
    <rect x="10" y="30" width="5" height="5" fill="#f5c518"/>
    <rect x="15" y="30" width="5" height="5" fill="#f5c518"/>
    <!-- Row 7: _ _ X X _ _ -->
    <rect x="10" y="35" width="5" height="5" fill="#f5c518"/>
    <rect x="15" y="35" width="5" height="5" fill="#f5c518"/>
  </g>
  <!-- Wordmark -->
  <text x="48" y="34" font-family="'JetBrains Mono', 'Courier New', monospace" font-weight="700" font-size="22" letter-spacing="-0.5" fill="#f5c518">JamJet</text>
</svg>
