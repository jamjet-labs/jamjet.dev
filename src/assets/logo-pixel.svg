<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 40" fill="none">
  <!-- Sumi mark — J + velocity slash in a compact form -->
  <g transform="translate(2,4)">
    <!-- Ink square background -->
    <rect width="32" height="32" rx="3" fill="#141413"/>
    <!-- J stroke -->
    <path d="M13 8v13c0 1.5-1.2 2.7-2.7 2.7" stroke="#f6f5f1" stroke-width="2.2" stroke-linecap="round" fill="none"/>
    <!-- Velocity slash -->
    <line x1="18" y1="8" x2="23" y2="13.5" stroke="#f6f5f1" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <!-- Wordmark — DM Mono -->
  <text x="44" y="28" font-family="'DM Mono', 'JetBrains Mono', monospace" font-weight="500" font-size="19" letter-spacing="-0.3" fill="#141413">JamJet</text>
</svg>
