<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Washi paper background -->
  <rect width="1200" height="630" fill="#f6f5f1"/>

  <!-- Subtle washi texture — fine horizontal lines -->
  <line x1="0" y1="157" x2="1200" y2="157" stroke="#e5e4df" stroke-width="0.5"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#e5e4df" stroke-width="0.5"/>
  <line x1="0" y1="473" x2="1200" y2="473" stroke="#e5e4df" stroke-width="0.5"/>

  <!-- Sumi mark — scaled up -->
  <g transform="translate(140,215)">
    <rect width="200" height="200" rx="16" fill="#141413"/>
    <path d="M84 50v82c0 9.4-7.6 17-17 17" stroke="#f6f5f1" stroke-width="14" stroke-linecap="round" fill="none"/>
    <line x1="116" y1="50" x2="148" y2="85" stroke="#f6f5f1" stroke-width="14" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <text x="380" y="345" font-family="'DM Mono', 'Courier New', monospace" font-size="88" font-weight="500" fill="#141413" letter-spacing="-2">JamJet</text>

  <!-- Tagline -->
  <text x="384" y="400" font-family="'Newsreader', Georgia, serif" font-size="28" fill="#87867e" letter-spacing="0.3">The agent-native runtime</text>

  <!-- Divider -->
  <line x1="140" y1="450" x2="1060" y2="450" stroke="#cccbc4" stroke-width="1"/>

  <!-- Bottom descriptors — clean, no boxes -->
  <text x="140" y="500" font-family="'DM Mono', monospace" font-size="16" fill="#87867e">durable</text>
  <text x="140" y="500" font-family="'DM Mono', monospace" font-size="16" fill="#555550" dx="100">/</text>
  <text x="260" y="500" font-family="'DM Mono', monospace" font-size="16" fill="#87867e">MCP + A2A</text>
  <text x="260" y="500" font-family="'DM Mono', monospace" font-size="16" fill="#555550" dx="135">/</text>
  <text x="415" y="500" font-family="'DM Mono', monospace" font-size="16" fill="#87867e">Rust core</text>
  <text x="415" y="500" font-family="'DM Mono', monospace" font-size="16" fill="#555550" dx="118">/</text>
  <text x="553" y="500" font-family="'DM Mono', monospace" font-size="16" fill="#87867e">Python SDK</text>

  <!-- Install command -->
  <text x="140" y="560" font-family="'DM Mono', monospace" font-size="16" fill="#cccbc4">$ pip install jamjet</text>

  <!-- Domain -->
  <text x="1060" y="560" font-family="'DM Mono', monospace" font-size="16" fill="#cccbc4" text-anchor="end">jamjet.dev</text>
</svg>
