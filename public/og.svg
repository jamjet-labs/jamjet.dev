<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f0f11"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#1a1a1f" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#1a1a1f" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#1a1a1f" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#1a1a1f" stroke-width="1"/>

  <!-- Yellow glow behind logo -->
  <ellipse cx="160" cy="315" rx="120" ry="120" fill="#f5c518" fill-opacity="0.06"/>

  <!-- Pixel art lightning bolt logo (scaled up, centered at ~160,315) -->
  <!-- Each pixel = 10x10, grid origin at 80,235 -->
  <!-- Row 0: cols 2,3 -->
  <rect x="100" y="235" width="10" height="10" fill="#f5c518"/>
  <rect x="110" y="235" width="10" height="10" fill="#f5c518"/>
  <!-- Row 1: cols 1,2,3,4 -->
  <rect x="90"  y="245" width="10" height="10" fill="#f5c518"/>
  <rect x="100" y="245" width="10" height="10" fill="#f5c518"/>
  <rect x="110" y="245" width="10" height="10" fill="#f5c518"/>
  <rect x="120" y="245" width="10" height="10" fill="#f5c518"/>
  <!-- Row 2: cols 2,3 -->
  <rect x="100" y="255" width="10" height="10" fill="#f5c518"/>
  <rect x="110" y="255" width="10" height="10" fill="#f5c518"/>
  <!-- Row 3: cols 0,1,2,3 -->
  <rect x="80"  y="265" width="10" height="10" fill="#f5c518"/>
  <rect x="90"  y="265" width="10" height="10" fill="#f5c518"/>
  <rect x="100" y="265" width="10" height="10" fill="#f5c518"/>
  <rect x="110" y="265" width="10" height="10" fill="#f5c518"/>
  <!-- Row 4: cols 1,2,3,4,5 -->
  <rect x="90"  y="275" width="10" height="10" fill="#f5c518"/>
  <rect x="100" y="275" width="10" height="10" fill="#f5c518"/>
  <rect x="110" y="275" width="10" height="10" fill="#f5c518"/>
  <rect x="120" y="275" width="10" height="10" fill="#f5c518"/>
  <rect x="130" y="275" width="10" height="10" fill="#f5c518"/>
  <!-- Row 5: cols 2,3 -->
  <rect x="100" y="285" width="10" height="10" fill="#f5c518"/>
  <rect x="110" y="285" width="10" height="10" fill="#f5c518"/>
  <!-- Row 6: cols 2,3 -->
  <rect x="100" y="295" width="10" height="10" fill="#f5c518"/>
  <rect x="110" y="295" width="10" height="10" fill="#f5c518"/>

  <!-- Wordmark: JamJet -->
  <text x="220" y="330" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="80" font-weight="700" fill="#f5c518" letter-spacing="-2">JamJet</text>

  <!-- Tagline -->
  <text x="220" y="385" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="24" fill="#888899" letter-spacing="0.5">The agent-native runtime</text>

  <!-- Divider -->
  <line x1="80" y1="430" x2="1120" y2="430" stroke="#2a2a35" stroke-width="1"/>

  <!-- Bottom pills -->
  <!-- Durable -->
  <rect x="80" y="460" width="160" height="36" rx="6" fill="#1a1a22" stroke="#f5c518" stroke-opacity="0.3" stroke-width="1"/>
  <text x="160" y="484" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="14" fill="#f5c518" text-anchor="middle">durable</text>

  <!-- MCP + A2A -->
  <rect x="256" y="460" width="200" height="36" rx="6" fill="#1a1a22" stroke="#f5c518" stroke-opacity="0.3" stroke-width="1"/>
  <text x="356" y="484" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="14" fill="#f5c518" text-anchor="middle">MCP + A2A native</text>

  <!-- Rust powered -->
  <rect x="472" y="460" width="180" height="36" rx="6" fill="#1a1a22" stroke="#f5c518" stroke-opacity="0.3" stroke-width="1"/>
  <text x="562" y="484" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="14" fill="#f5c518" text-anchor="middle">Rust powered</text>

  <!-- Python SDK -->
  <rect x="668" y="460" width="180" height="36" rx="6" fill="#1a1a22" stroke="#f5c518" stroke-opacity="0.3" stroke-width="1"/>
  <text x="758" y="484" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="14" fill="#f5c518" text-anchor="middle">Python SDK</text>

  <!-- pip install -->
  <rect x="864" y="460" width="256" height="36" rx="6" fill="#1a1a22" stroke="#444455" stroke-width="1"/>
  <text x="992" y="484" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="14" fill="#666677" text-anchor="middle">pip install jamjet</text>

  <!-- Domain bottom right -->
  <text x="1140" y="590" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="16" fill="#444455" text-anchor="end">jamjet.dev</text>
</svg>
