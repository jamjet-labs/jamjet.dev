<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" fill="none">
  <style>
    text { font-family: 'Inter', system-ui, sans-serif; }
    .label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
    .cat-title { font-size: 11px; font-weight: 600; }
    .leaf { font-size: 9px; }
    .trunk { font-size: 13px; font-weight: 700; }
    .trunk-sub { font-size: 10px; }
  </style>

  <!-- Outer background -->
  <rect width="800" height="340" rx="8" fill="#fafaf8"/>
  <rect x="1" y="1" width="798" height="338" rx="7" stroke="#1a1a18" stroke-opacity="0.08" fill="none"/>

  <!-- Section header -->
  <text x="400" y="24" text-anchor="middle" fill="#8b7355" class="label">One root cause. Five infrastructure gaps.</text>

  <!-- ======== TRUNK ======== -->
  <rect x="260" y="268" width="280" height="50" rx="8" fill="#1a1a18"/>
  <text x="400" y="289" text-anchor="middle" fill="#ffffff" class="trunk">Prototype Infrastructure</text>
  <text x="400" y="307" text-anchor="middle" fill="#ffffff" fill-opacity="0.7" class="trunk-sub">in Production</text>

  <!-- ======== BRANCH LINES (trunk top to category nodes) ======== -->
  <!-- Trunk top center: 400, 268 -->

  <!-- Branch to Category 1: Hallucination Guardrails (x=80) -->
  <path d="M400 268 L400 248 L80 248 L80 198" stroke="#8b7355" stroke-opacity="0.4" stroke-width="1.5" fill="none"/>

  <!-- Branch to Category 2: Human-in-the-Loop (x=220) -->
  <path d="M400 268 L400 248 L220 248 L220 198" stroke="#8b7355" stroke-opacity="0.4" stroke-width="1.5" fill="none"/>

  <!-- Branch to Category 3: Audit Trail (x=400) -->
  <path d="M400 268 L400 198" stroke="#8b7355" stroke-opacity="0.4" stroke-width="1.5" fill="none"/>

  <!-- Branch to Category 4: Content Boundaries (x=580) -->
  <path d="M400 268 L400 248 L580 248 L580 198" stroke="#8b7355" stroke-opacity="0.4" stroke-width="1.5" fill="none"/>

  <!-- Branch to Category 5: Quality Monitoring (x=720) -->
  <path d="M400 268 L400 248 L720 248 L720 198" stroke="#8b7355" stroke-opacity="0.4" stroke-width="1.5" fill="none"/>

  <!-- ======== CATEGORY 1: Hallucination Guardrails (x=80) ======== -->
  <rect x="18" y="155" width="124" height="40" rx="6" fill="#b33" fill-opacity="0.08" stroke="#b33" stroke-opacity="0.35" stroke-width="1"/>
  <text x="80" y="171" text-anchor="middle" fill="#8b1a1a" class="cat-title">Hallucination</text>
  <text x="80" y="186" text-anchor="middle" fill="#8b1a1a" class="cat-title">Guardrails</text>

  <!-- Leaf lines from cat 1 -->
  <line x1="80" y1="155" x2="46" y2="130" stroke="#8b7355" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="80" y1="155" x2="80" y2="130" stroke="#8b7355" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="80" y1="155" x2="114" y2="130" stroke="#8b7355" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Leaf: Air Canada -->
  <rect x="16" y="110" width="62" height="20" rx="10" fill="#fafaf8" stroke="#1a1a18" stroke-opacity="0.15" stroke-width="1"/>
  <text x="47" y="123" text-anchor="middle" fill="#6b6b63" class="leaf">Air Canada</text>

  <!-- Leaf: NYC -->
  <rect x="55" y="110" width="50" height="20" rx="10" fill="#fafaf8" stroke="#1a1a18" stroke-opacity="0.15" stroke-width="1"/>
  <text x="80" y="123" text-anchor="middle" fill="#6b6b63" class="leaf">NYC</text>

  <!-- Leaf: Lawyer -->
  <rect x="88" y="110" width="54" height="20" rx="10" fill="#fafaf8" stroke="#1a1a18" stroke-opacity="0.15" stroke-width="1"/>
  <text x="115" y="123" text-anchor="middle" fill="#6b6b63" class="leaf">Lawyer</text>

  <!-- ======== CATEGORY 2: Human-in-the-Loop (x=220) ======== -->
  <rect x="158" y="155" width="124" height="40" rx="6" fill="#b33" fill-opacity="0.08" stroke="#b33" stroke-opacity="0.35" stroke-width="1"/>
  <text x="220" y="171" text-anchor="middle" fill="#8b1a1a" class="cat-title">Human-in-</text>
  <text x="220" y="186" text-anchor="middle" fill="#8b1a1a" class="cat-title">the-Loop</text>

  <!-- Leaf lines from cat 2 -->
  <line x1="220" y1="155" x2="196" y2="130" stroke="#8b7355" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="220" y1="155" x2="244" y2="130" stroke="#8b7355" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Leaf: Klarna -->
  <rect x="165" y="110" width="64" height="20" rx="10" fill="#fafaf8" stroke="#1a1a18" stroke-opacity="0.15" stroke-width="1"/>
  <text x="197" y="123" text-anchor="middle" fill="#6b6b63" class="leaf">Klarna</text>

  <!-- Leaf: DPD -->
  <rect x="216" y="110" width="56" height="20" rx="10" fill="#fafaf8" stroke="#1a1a18" stroke-opacity="0.15" stroke-width="1"/>
  <text x="244" y="123" text-anchor="middle" fill="#6b6b63" class="leaf">DPD</text>

  <!-- ======== CATEGORY 3: Audit Trail (x=400) ======== -->
  <rect x="338" y="155" width="124" height="40" rx="6" fill="#b33" fill-opacity="0.08" stroke="#b33" stroke-opacity="0.35" stroke-width="1"/>
  <text x="400" y="171" text-anchor="middle" fill="#8b1a1a" class="cat-title">Audit</text>
  <text x="400" y="186" text-anchor="middle" fill="#8b1a1a" class="cat-title">Trail</text>

  <!-- Leaf lines from cat 3 -->
  <line x1="400" y1="155" x2="376" y2="130" stroke="#8b7355" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="400" y1="155" x2="424" y2="130" stroke="#8b7355" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Leaf: Air Canada -->
  <rect x="342" y="110" width="70" height="20" rx="10" fill="#fafaf8" stroke="#1a1a18" stroke-opacity="0.15" stroke-width="1"/>
  <text x="377" y="123" text-anchor="middle" fill="#6b6b63" class="leaf">Air Canada</text>

  <!-- Leaf: Samsung -->
  <rect x="393" y="110" width="64" height="20" rx="10" fill="#fafaf8" stroke="#1a1a18" stroke-opacity="0.15" stroke-width="1"/>
  <text x="425" y="123" text-anchor="middle" fill="#6b6b63" class="leaf">Samsung</text>

  <!-- ======== CATEGORY 4: Content Boundaries (x=580) ======== -->
  <rect x="518" y="155" width="124" height="40" rx="6" fill="#b33" fill-opacity="0.08" stroke="#b33" stroke-opacity="0.35" stroke-width="1"/>
  <text x="580" y="171" text-anchor="middle" fill="#8b1a1a" class="cat-title">Content</text>
  <text x="580" y="186" text-anchor="middle" fill="#8b1a1a" class="cat-title">Boundaries</text>

  <!-- Leaf lines from cat 4 -->
  <line x1="580" y1="155" x2="549" y2="130" stroke="#8b7355" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="580" y1="155" x2="580" y2="130" stroke="#8b7355" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="580" y1="155" x2="611" y2="130" stroke="#8b7355" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Leaf: DPD -->
  <rect x="521" y="110" width="56" height="20" rx="10" fill="#fafaf8" stroke="#1a1a18" stroke-opacity="0.15" stroke-width="1"/>
  <text x="549" y="123" text-anchor="middle" fill="#6b6b63" class="leaf">DPD</text>

  <!-- Leaf: Chevy -->
  <rect x="554" y="110" width="52" height="20" rx="10" fill="#fafaf8" stroke="#1a1a18" stroke-opacity="0.15" stroke-width="1"/>
  <text x="580" y="123" text-anchor="middle" fill="#6b6b63" class="leaf">Chevy</text>

  <!-- Leaf: NYC -->
  <rect x="584" y="110" width="54" height="20" rx="10" fill="#fafaf8" stroke="#1a1a18" stroke-opacity="0.15" stroke-width="1"/>
  <text x="611" y="123" text-anchor="middle" fill="#6b6b63" class="leaf">NYC</text>

  <!-- ======== CATEGORY 5: Quality Monitoring (x=720) ======== -->
  <rect x="658" y="155" width="124" height="40" rx="6" fill="#b33" fill-opacity="0.08" stroke="#b33" stroke-opacity="0.35" stroke-width="1"/>
  <text x="720" y="171" text-anchor="middle" fill="#8b1a1a" class="cat-title">Quality</text>
  <text x="720" y="186" text-anchor="middle" fill="#8b1a1a" class="cat-title">Monitoring</text>

  <!-- Leaf line from cat 5 -->
  <line x1="720" y1="155" x2="720" y2="130" stroke="#8b7355" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Leaf: Klarna -->
  <rect x="688" y="110" width="64" height="20" rx="10" fill="#fafaf8" stroke="#1a1a18" stroke-opacity="0.15" stroke-width="1"/>
  <text x="720" y="123" text-anchor="middle" fill="#6b6b63" class="leaf">Klarna</text>

</svg>
