<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" fill="none">
  <style>
    text { font-family: 'Inter', system-ui, sans-serif; }
    .mono { font-family: 'JetBrains Mono', 'Fira Code', monospace; }
    .label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
    .title { font-size: 13px; font-weight: 600; }
    .desc { font-size: 12px; }
    .small { font-size: 10.5px; }
    .head { font-size: 18px; font-weight: 600; }
  </style>

  <rect width="1100" height="700" rx="8" fill="#fafaf8"/>
  <rect x="1" y="1" width="1098" height="698" rx="7" stroke="#1a1a18" stroke-opacity="0.08" fill="none"/>

  <text x="550" y="40" text-anchor="middle" fill="#1a1a18" class="head">JamJet: one policy file, every adapter, one audit log.</text>
  <text x="550" y="62" text-anchor="middle" fill="#8b7355" class="label">Same YAML. Same JSONL. Different surfaces.</text>

  <!-- ==== Top: the single policy.yaml ==== -->
  <rect x="380" y="90" width="340" height="138" rx="6" fill="#fff" stroke="#1a1a18" stroke-width="2"/>
  <rect x="380" y="90" width="340" height="22" rx="6" fill="#1a1a18"/>
  <rect x="380" y="100" width="340" height="12" fill="#1a1a18"/>
  <text x="395" y="106" fill="#fafaf8" class="mono small">policy.yaml</text>
  <text x="700" y="106" text-anchor="end" fill="#f5c518" class="mono small">v1</text>

  <text x="398" y="135" fill="#1a1a18" class="mono small">version: 1</text>
  <text x="398" y="153" fill="#1a1a18" class="mono small">rules:</text>
  <text x="398" y="171" fill="#1a1a18" class="mono small">  - { match: "*delete*",   action: block }</text>
  <text x="398" y="189" fill="#1a1a18" class="mono small">  - { match: "shell.exec",  action: block }</text>
  <text x="398" y="207" fill="#1a1a18" class="mono small">  - { match: "payments.*",  action: require_approval }</text>
  <text x="398" y="225" fill="#8b7355" class="mono small">audit: { destination: ~/.jamjet/audit }</text>

  <!-- Fan-out lines from policy to each adapter -->
  <line x1="550" y1="228" x2="155" y2="320" stroke="#8b8578" stroke-width="1.2"/>
  <line x1="550" y1="228" x2="350" y2="320" stroke="#8b8578" stroke-width="1.2"/>
  <line x1="550" y1="228" x2="550" y2="320" stroke="#8b8578" stroke-width="1.2"/>
  <line x1="550" y1="228" x2="750" y2="320" stroke="#8b8578" stroke-width="1.2"/>
  <line x1="550" y1="228" x2="945" y2="320" stroke="#8b8578" stroke-width="1.2"/>

  <!-- ==== Five adapters ==== -->
  <!-- 1: claude-code-hook -->
  <rect x="55" y="320" width="200" height="86" rx="6" fill="#fff" stroke="#1a1a18" stroke-opacity="0.18"/>
  <text x="155" y="345" text-anchor="middle" fill="#1a1a18" class="title">Claude Code</text>
  <text x="155" y="365" text-anchor="middle" fill="#6b6b63" class="mono small">@jamjet/claude-code-hook</text>
  <text x="155" y="384" text-anchor="middle" fill="#8b7355" class="small">PreToolUse hook</text>
  <text x="155" y="399" text-anchor="middle" fill="#8b7355" class="small">npm i -g</text>

  <!-- 2: mcp-shim -->
  <rect x="250" y="320" width="200" height="86" rx="6" fill="#fff" stroke="#1a1a18" stroke-opacity="0.18"/>
  <text x="350" y="345" text-anchor="middle" fill="#1a1a18" class="title">MCP stdio</text>
  <text x="350" y="365" text-anchor="middle" fill="#6b6b63" class="mono small">@jamjet/mcp-shim</text>
  <text x="350" y="384" text-anchor="middle" fill="#8b7355" class="small">client &lt;-&gt; server proxy</text>
  <text x="350" y="399" text-anchor="middle" fill="#8b7355" class="small">npx -y</text>

  <!-- 3: openai-guardrail (TS) -->
  <rect x="450" y="320" width="200" height="86" rx="6" fill="#fff" stroke="#1a1a18" stroke-opacity="0.18"/>
  <text x="550" y="345" text-anchor="middle" fill="#1a1a18" class="title">OpenAI Agents (TS)</text>
  <text x="550" y="365" text-anchor="middle" fill="#6b6b63" class="mono small">@jamjet/openai-guardrail</text>
  <text x="550" y="384" text-anchor="middle" fill="#8b7355" class="small">inputGuardrails</text>
  <text x="550" y="399" text-anchor="middle" fill="#8b7355" class="small">pnpm add</text>

  <!-- 4: jamjet python integrations.openai_guardrail -->
  <rect x="650" y="320" width="200" height="86" rx="6" fill="#fff" stroke="#1a1a18" stroke-opacity="0.18"/>
  <text x="750" y="345" text-anchor="middle" fill="#1a1a18" class="title">OpenAI Agents (Py)</text>
  <text x="750" y="362" text-anchor="middle" fill="#6b6b63" class="mono small">jamjet.integrations</text>
  <text x="750" y="378" text-anchor="middle" fill="#6b6b63" class="mono small">.openai_guardrail</text>
  <text x="750" y="397" text-anchor="middle" fill="#8b7355" class="small">pip install jamjet</text>

  <!-- 5: jamjet/cloud TS SDK -->
  <rect x="845" y="320" width="200" height="86" rx="6" fill="#fff" stroke="#1a1a18" stroke-opacity="0.18"/>
  <text x="945" y="345" text-anchor="middle" fill="#1a1a18" class="title">Custom runtime</text>
  <text x="945" y="365" text-anchor="middle" fill="#6b6b63" class="mono small">@jamjet/cloud</text>
  <text x="945" y="384" text-anchor="middle" fill="#8b7355" class="small">PolicyEvaluator</text>
  <text x="945" y="399" text-anchor="middle" fill="#8b7355" class="small">universal core</text>

  <!-- Down lines from each adapter to audit dir -->
  <line x1="155" y1="406" x2="350" y2="530" stroke="#8b8578" stroke-width="1.2"/>
  <line x1="350" y1="406" x2="450" y2="530" stroke="#8b8578" stroke-width="1.2"/>
  <line x1="550" y1="406" x2="550" y2="530" stroke="#8b8578" stroke-width="1.2"/>
  <line x1="750" y1="406" x2="650" y2="530" stroke="#8b8578" stroke-width="1.2"/>
  <line x1="945" y1="406" x2="750" y2="530" stroke="#8b8578" stroke-width="1.2"/>

  <!-- ==== Bottom: the single audit directory ==== -->
  <rect x="340" y="530" width="420" height="118" rx="6" fill="#1a1a18"/>
  <text x="550" y="556" text-anchor="middle" fill="#f5c518" class="label">~/.jamjet/audit/</text>
  <text x="550" y="582" text-anchor="middle" fill="#fafaf8" class="mono small">2026-05-11/claude-code-hook.jsonl</text>
  <text x="550" y="600" text-anchor="middle" fill="#fafaf8" class="mono small">2026-05-11/mcp-shim.jsonl</text>
  <text x="550" y="618" text-anchor="middle" fill="#fafaf8" class="mono small">2026-05-11/openai-guardrail.jsonl</text>
  <text x="550" y="636" text-anchor="middle" fill="#fafaf8" class="mono small">2026-05-11/python-sdk.jsonl</text>

  <!-- Caption -->
  <text x="550" y="678" text-anchor="middle" fill="#6b6b63" class="small">jamjet audit show — tails every adapter in one chronological view.</text>
</svg>
