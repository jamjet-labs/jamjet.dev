<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 300" fill="none">
  <style>
    text { font-family: 'Inter', system-ui, sans-serif; }
    .mono { font-family: 'JetBrains Mono', 'Fira Code', monospace; }
    .label { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
    .title { font-size: 13px; font-weight: 600; }
    .desc { font-size: 11px; }
    .sm { font-size: 10px; }
    .code { font-size: 10px; font-family: 'JetBrains Mono', monospace; }
  </style>

  <!-- Background -->
  <rect width="740" height="300" rx="8" fill="#fafaf8"/>
  <rect x="1" y="1" width="738" height="298" rx="7" stroke="#1a1a18" stroke-opacity="0.08" fill="none"/>

  <!-- Title -->
  <text x="370" y="28" text-anchor="middle" fill="#8b7355" class="label">Cross-Org A2A Federation with mTLS</text>

  <!-- Org A -->
  <rect x="30" y="48" width="260" height="200" rx="6" fill="none" stroke="#1a1a18" stroke-opacity="0.10"/>
  <rect x="30" y="48" width="260" height="28" rx="6" fill="#f5f4f0"/>
  <rect x="30" y="70" width="260" height="6" fill="#fafaf8"/>
  <text x="160" y="67" text-anchor="middle" fill="#1a1a18" class="title">Organization A</text>

  <!-- Agent A -->
  <rect x="56" y="86" width="208" height="44" rx="4" fill="#8b7355"/>
  <text x="160" y="106" text-anchor="middle" fill="#fafaf8" class="title">Research Agent</text>
  <text x="160" y="122" text-anchor="middle" fill="rgba(250,250,248,0.7)" class="sm">agent-id: agent-alpha</text>

  <!-- Cert A -->
  <rect x="56" y="142" width="208" height="36" rx="3" fill="#f5f4f0" stroke="#1a1a18" stroke-opacity="0.06"/>
  <text x="72" y="160" fill="#6b6b63" class="sm">TLS Certificate</text>
  <text x="170" y="164" fill="#8b8578" class="code">CN=agent-alpha.org-a.com</text>

  <!-- Policy A -->
  <rect x="56" y="188" width="208" height="48" rx="3" fill="#f5f4f0" stroke="#1a1a18" stroke-opacity="0.06"/>
  <text x="72" y="206" fill="#6b6b63" class="sm">FederationPolicy</text>
  <text x="72" y="222" fill="#8b8578" class="code">scopes: [read, write]</text>
  <text x="72" y="234" fill="#8b8578" class="code">allowed_agents: [agent-beta]</text>

  <!-- Org B -->
  <rect x="450" y="48" width="260" height="200" rx="6" fill="none" stroke="#1a1a18" stroke-opacity="0.10"/>
  <rect x="450" y="48" width="260" height="28" rx="6" fill="#f5f4f0"/>
  <rect x="450" y="70" width="260" height="6" fill="#fafaf8"/>
  <text x="580" y="67" text-anchor="middle" fill="#1a1a18" class="title">Organization B</text>

  <!-- Agent B -->
  <rect x="476" y="86" width="208" height="44" rx="4" fill="#c4956a"/>
  <text x="580" y="106" text-anchor="middle" fill="#fafaf8" class="title">Analysis Agent</text>
  <text x="580" y="122" text-anchor="middle" fill="rgba(250,250,248,0.7)" class="sm">agent-id: agent-beta</text>

  <!-- Cert B -->
  <rect x="476" y="142" width="208" height="36" rx="3" fill="#f5f4f0" stroke="#1a1a18" stroke-opacity="0.06"/>
  <text x="492" y="160" fill="#6b6b63" class="sm">TLS Certificate</text>
  <text x="590" y="164" fill="#8b8578" class="code">CN=agent-beta.org-b.com</text>

  <!-- Policy B -->
  <rect x="476" y="188" width="208" height="48" rx="3" fill="#f5f4f0" stroke="#1a1a18" stroke-opacity="0.06"/>
  <text x="492" y="206" fill="#6b6b63" class="sm">FederationPolicy</text>
  <text x="492" y="222" fill="#8b8578" class="code">require_auth: true</text>
  <text x="492" y="234" fill="#8b8578" class="code">method_scopes: tasks/send: [write]</text>

  <!-- Connection: mTLS + Bearer -->
  <rect x="300" y="86" width="140" height="84" rx="6" fill="#2a2a28"/>
  <text x="370" y="106" text-anchor="middle" fill="#c4956a" class="label">A2A Protocol</text>
  <text x="370" y="126" text-anchor="middle" fill="#eae8e1" class="sm">mTLS mutual auth</text>
  <text x="370" y="142" text-anchor="middle" fill="#eae8e1" class="code">Bearer tok-alpha</text>
  <text x="370" y="158" text-anchor="middle" fill="#6b6b63" class="sm">capability-scoped</text>

  <!-- Arrows -->
  <line x1="264" y1="108" x2="300" y2="108" stroke="#8b7355" stroke-width="1.5"/>
  <polygon points="296,105 304,108 296,111" fill="#8b7355"/>
  <line x1="440" y1="108" x2="476" y2="108" stroke="#c4956a" stroke-width="1.5"/>
  <polygon points="472,105 480,108 472,111" fill="#c4956a"/>

  <!-- Bottom: Auth middleware -->
  <rect x="160" y="260" width="420" height="28" rx="4" fill="#f5f4f0" stroke="#8b7355" stroke-width="1"/>
  <text x="370" y="278" text-anchor="middle" fill="#8b7355" class="desc">federation_auth_layer — Axum middleware validates tokens, checks scopes, enforces agent allowlists</text>
</svg>
