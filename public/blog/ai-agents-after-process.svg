<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" fill="none">
  <style>
    text { font-family: 'Inter', system-ui, sans-serif; }
    .mono { font-family: 'JetBrains Mono', 'Fira Code', monospace; }
    .label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
    .title { font-size: 13px; font-weight: 600; }
    .desc { font-size: 11px; }
    .small { font-size: 9.5px; }
    .time { font-size: 11px; font-weight: 600; }
  </style>

  <!-- Background -->
  <rect width="800" height="460" rx="8" fill="#fafaf8"/>
  <rect x="1" y="1" width="798" height="458" rx="7" stroke="#1a1a18" stroke-opacity="0.08" fill="none"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" fill="#8b7355" class="label">With AI Agents: The same recommendation, orchestrated</text>

  <!-- Workflow Orchestrator container -->
  <rect x="60" y="40" width="680" height="350" rx="6" fill="rgba(139,115,85,0.03)" stroke="#8b7355" stroke-opacity="0.30" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="74" y="54" fill="#8b7355" class="label">Workflow Orchestrator</text>

  <!-- ═══ Agent 1: Risk Profiler ═══ -->
  <rect x="220" y="66" width="350" height="48" rx="5" fill="#fff" stroke="#1a1a18" stroke-opacity="0.12"/>
  <rect x="220" y="66" width="350" height="18" rx="5" fill="rgba(26,26,24,0.04)"/>
  <rect x="564" y="66" width="6" height="18" fill="rgba(26,26,24,0.04)"/>
  <text x="232" y="79" fill="#8b8578" class="label">Agent 1</text>
  <text x="290" y="79" fill="#1a1a18" class="title">Risk Profiler</text>
  <rect x="500" y="68" width="52" height="14" rx="3" fill="rgba(45,125,70,0.10)"/>
  <text x="526" y="78" text-anchor="middle" fill="#2d7d46" class="mono small">~2 min</text>
  <text x="232" y="101" fill="#6b6b63" class="desc">Ingests client profile, scores risk tolerance and capacity</text>

  <!-- Arrow down + parallel fork -->
  <line x1="395" y1="114" x2="395" y2="134" stroke="#8b8578" stroke-width="1.5"/>
  <line x1="230" y1="134" x2="560" y2="134" stroke="#8b8578" stroke-width="1.5"/>
  <line x1="230" y1="134" x2="230" y2="150" stroke="#8b8578" stroke-width="1.5"/>
  <polygon points="226,148 234,148 230,154" fill="#8b8578"/>
  <line x1="560" y1="134" x2="560" y2="150" stroke="#8b8578" stroke-width="1.5"/>
  <polygon points="556,148 564,148 560,154" fill="#8b8578"/>

  <!-- "runs in parallel" label -->
  <rect x="358" y="124" width="76" height="14" rx="3" fill="rgba(45,125,70,0.08)"/>
  <text x="396" y="134" text-anchor="middle" fill="#2d7d46" class="small">runs in parallel</text>

  <!-- ═══ Agent 2: Market Analyst (left) ═══ -->
  <rect x="80" y="156" width="310" height="48" rx="5" fill="#fff" stroke="#1a1a18" stroke-opacity="0.12"/>
  <rect x="80" y="156" width="310" height="18" rx="5" fill="rgba(26,26,24,0.04)"/>
  <rect x="384" y="156" width="6" height="18" fill="rgba(26,26,24,0.04)"/>
  <text x="92" y="169" fill="#8b8578" class="label">Agent 2</text>
  <text x="150" y="169" fill="#1a1a18" class="title">Market Analyst</text>
  <rect x="322" y="158" width="52" height="14" rx="3" fill="rgba(45,125,70,0.10)"/>
  <text x="348" y="168" text-anchor="middle" fill="#2d7d46" class="mono small">~8 min</text>
  <text x="92" y="191" fill="#6b6b63" class="desc">Scans market data, identifies sector opportunities</text>

  <!-- ═══ Agent 3: Tax Strategist (right) ═══ -->
  <rect x="410" y="156" width="310" height="48" rx="5" fill="#fff" stroke="#1a1a18" stroke-opacity="0.12"/>
  <rect x="410" y="156" width="310" height="18" rx="5" fill="rgba(26,26,24,0.04)"/>
  <rect x="714" y="156" width="6" height="18" fill="rgba(26,26,24,0.04)"/>
  <text x="422" y="169" fill="#8b8578" class="label">Agent 3</text>
  <text x="480" y="169" fill="#1a1a18" class="title">Tax Strategist</text>
  <rect x="652" y="158" width="52" height="14" rx="3" fill="rgba(45,125,70,0.10)"/>
  <text x="678" y="168" text-anchor="middle" fill="#2d7d46" class="mono small">~7 min</text>
  <text x="422" y="191" fill="#6b6b63" class="desc">Models tax implications, flags optimization paths</text>

  <!-- Merge arrows -->
  <line x1="235" y1="204" x2="235" y2="222" stroke="#8b8578" stroke-width="1.5"/>
  <line x1="235" y1="222" x2="395" y2="222" stroke="#8b8578" stroke-width="1.5"/>
  <line x1="565" y1="204" x2="565" y2="222" stroke="#8b8578" stroke-width="1.5"/>
  <line x1="565" y1="222" x2="395" y2="222" stroke="#8b8578" stroke-width="1.5"/>
  <line x1="395" y1="222" x2="395" y2="240" stroke="#8b8578" stroke-width="1.5"/>
  <polygon points="391,238 399,238 395,244" fill="#8b8578"/>

  <!-- ═══ Agent 4: Portfolio Architect ═══ -->
  <rect x="220" y="246" width="350" height="48" rx="5" fill="#fff" stroke="#1a1a18" stroke-opacity="0.12"/>
  <rect x="220" y="246" width="350" height="18" rx="5" fill="rgba(26,26,24,0.04)"/>
  <rect x="564" y="246" width="6" height="18" fill="rgba(26,26,24,0.04)"/>
  <text x="232" y="259" fill="#8b8578" class="label">Agent 4</text>
  <text x="290" y="259" fill="#1a1a18" class="title">Portfolio Architect</text>
  <rect x="500" y="248" width="52" height="14" rx="3" fill="rgba(45,125,70,0.10)"/>
  <text x="526" y="258" text-anchor="middle" fill="#2d7d46" class="mono small">~5 min</text>
  <text x="232" y="281" fill="#6b6b63" class="desc">Synthesizes all agent outputs into final recommendation</text>

  <!-- Arrow to Human Approval -->
  <line x1="395" y1="294" x2="395" y2="314" stroke="#8b8578" stroke-width="1.5"/>
  <polygon points="391,312 399,312 395,318" fill="#8b8578"/>

  <!-- ═══ Human Approval Gate ═══ -->
  <rect x="220" y="320" width="350" height="48" rx="6" fill="rgba(45,125,70,0.06)" stroke="#2d7d46" stroke-opacity="0.45" stroke-width="1.5"/>
  <rect x="222" y="322" width="346" height="18" rx="4" fill="rgba(45,125,70,0.08)"/>
  <text x="234" y="335" fill="#2d7d46" class="label">Human Approval Gate</text>
  <rect x="500" y="324" width="52" height="14" rx="3" fill="rgba(45,125,70,0.12)"/>
  <text x="526" y="334" text-anchor="middle" fill="#2d7d46" class="mono small">~3 min</text>
  <text x="234" y="356" fill="#2d7d46" class="desc">Advisor reviews full audit trail — approves or requests revision</text>

  <!-- ═══ Bottom summary bar ═══ -->
  <rect x="80" y="410" width="640" height="36" rx="5" fill="rgba(45,125,70,0.06)" stroke="#2d7d46" stroke-opacity="0.20" stroke-width="1"/>
  <text x="400" y="427" text-anchor="middle" fill="#2d7d46" class="time">Total: ~20 minutes</text>
  <text x="400" y="440" text-anchor="middle" fill="#8b8578" class="small">Full audit trail · crash-safe · zero context loss · consistent shared assumptions</text>

</svg>
