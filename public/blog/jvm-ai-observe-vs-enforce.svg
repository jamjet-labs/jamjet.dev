<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" fill="none">
  <style>
    text { font-family: 'Inter', system-ui, sans-serif; }
    .label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
    .lane { font-size: 11px; font-weight: 700; letter-spacing: 0.10em; text-transform: uppercase; }
    .node-label { font-size: 10.5px; font-weight: 600; }
    .tag { font-size: 9px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
    .annot { font-size: 9.5px; }
    .caption { font-size: 11px; font-weight: 600; font-style: italic; }
  </style>

  <defs>
    <marker id="ar-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2d7d46" fill-opacity="0.8"/>
    </marker>
    <marker id="ar-amber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#b45309" fill-opacity="0.7"/>
    </marker>
  </defs>

  <rect width="800" height="300" rx="8" fill="#fafaf8"/>
  <rect x="1" y="1" width="798" height="298" rx="7" stroke="#1a1a18" stroke-opacity="0.08" fill="none"/>

  <text x="400" y="24" text-anchor="middle" fill="#8b7355" class="label">The JVM shipped the meter, not the valve</text>

  <!-- ===================== OBSERVE lane (green, complete) ===================== -->
  <text x="24" y="78" fill="#2d7d46" class="lane">Observe</text>
  <text x="24" y="92" fill="#2d7d46" fill-opacity="0.7" class="annot">shipped</text>

  <rect x="120" y="62" width="150" height="30" rx="6" fill="#fff" stroke="#2d7d46" stroke-opacity="0.45" stroke-width="1.2"/>
  <text x="195" y="81" text-anchor="middle" fill="#1a1a18" class="node-label">Token usage metric</text>

  <line x1="270" y1="77" x2="318" y2="77" stroke="#2d7d46" stroke-opacity="0.6" stroke-width="1.4" marker-end="url(#ar-green)"/>

  <rect x="320" y="62" width="130" height="30" rx="6" fill="#fff" stroke="#2d7d46" stroke-opacity="0.45" stroke-width="1.2"/>
  <text x="385" y="81" text-anchor="middle" fill="#1a1a18" class="node-label">OTLP export</text>

  <line x1="450" y1="77" x2="498" y2="77" stroke="#2d7d46" stroke-opacity="0.6" stroke-width="1.4" marker-end="url(#ar-green)"/>

  <rect x="500" y="62" width="170" height="30" rx="6" fill="#fff" stroke="#2d7d46" stroke-opacity="0.45" stroke-width="1.2"/>
  <text x="585" y="81" text-anchor="middle" fill="#1a1a18" class="node-label">Prometheus / Grafana</text>

  <rect x="690" y="64" width="92" height="26" rx="13" fill="#2d7d46" fill-opacity="0.10" stroke="#2d7d46" stroke-opacity="0.32"/>
  <path d="M704 77 l4 4 l8 -9" stroke="#2d7d46" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="745" y="81" text-anchor="middle" fill="#2d7d46" class="tag">Visible</text>

  <text x="120" y="112" fill="#2d7d46" fill-opacity="0.85" class="annot">gen_ai.client.token.usage is standardized and emitted across the stack.</text>

  <!-- divider -->
  <line x1="24" y1="150" x2="776" y2="150" stroke="#1a1a18" stroke-opacity="0.08" stroke-width="1"/>

  <!-- ===================== ENFORCE lane (amber, broken) ===================== -->
  <text x="24" y="196" fill="#b45309" class="lane">Enforce</text>
  <text x="24" y="210" fill="#b45309" fill-opacity="0.7" class="annot">missing</text>

  <rect x="120" y="180" width="150" height="30" rx="6" fill="#fff" stroke="#b45309" stroke-opacity="0.45" stroke-width="1.2"/>
  <text x="195" y="199" text-anchor="middle" fill="#1a1a18" class="node-label">Set a budget limit</text>

  <!-- broken arrow into the missing gate -->
  <line x1="270" y1="195" x2="300" y2="195" stroke="#b45309" stroke-opacity="0.55" stroke-width="1.4" stroke-dasharray="3 4"/>
  <text x="312" y="199" fill="#b45309" fill-opacity="0.8" style="font-size:13px;font-weight:700">?</text>

  <!-- missing gate (dashed, X) -->
  <rect x="320" y="180" width="130" height="30" rx="6" fill="#fdf8f0" stroke="#b45309" stroke-opacity="0.5" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="385" y="199" text-anchor="middle" fill="#b45309" class="node-label">Gate the call</text>

  <line x1="450" y1="195" x2="498" y2="195" stroke="#b45309" stroke-opacity="0.4" stroke-width="1.4" stroke-dasharray="3 4"/>

  <rect x="500" y="180" width="170" height="30" rx="6" fill="#fdf8f0" stroke="#b45309" stroke-opacity="0.35" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="585" y="199" text-anchor="middle" fill="#b45309" fill-opacity="0.7" class="node-label">Spend capped</text>

  <rect x="690" y="182" width="92" height="26" rx="13" fill="#b45309" fill-opacity="0.08" stroke="#b45309" stroke-opacity="0.30"/>
  <text x="736" y="199" text-anchor="middle" fill="#b45309" class="tag">Your code</text>

  <text x="120" y="230" fill="#b45309" fill-opacity="0.85" class="annot">No flagship JVM framework ships budget enforcement out of the box.</text>

  <!-- caption -->
  <text x="400" y="272" text-anchor="middle" fill="#555550" class="caption">Observability without enforcement is a smoke detector with no sprinkler.</text>
</svg>
