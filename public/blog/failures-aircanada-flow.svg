<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" fill="none">
  <style>
    text { font-family: 'Inter', system-ui, sans-serif; }
    .label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
    .node-label { font-size: 10.5px; font-weight: 600; }
    .small { font-size: 9.5px; }
    .tag { font-size: 9px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
    .annot { font-size: 9.5px; }
  </style>

  <defs>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#b33" fill-opacity="0.8"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2d7d46" fill-opacity="0.8"/>
    </marker>
    <marker id="arrow-amber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c27a3a" fill-opacity="0.8"/>
    </marker>
  </defs>

  <!-- Outer background -->
  <rect width="800" height="280" rx="8" fill="#fafaf8"/>
  <rect x="1" y="1" width="798" height="278" rx="7" stroke="#1a1a18" stroke-opacity="0.08" fill="none"/>

  <!-- Section header -->
  <text x="400" y="24" text-anchor="middle" fill="#8b7355" class="label">What happened vs. what should have existed</text>

  <!-- ============================================================ -->
  <!-- LEFT PANEL — "What Air Canada shipped" (red-tinted) -->
  <!-- Panel: x=20, y=34, w=366, h=232 -->
  <!-- ============================================================ -->
  <rect x="20" y="34" width="366" height="232" rx="6" fill="#fff7f7" stroke="#b33" stroke-opacity="0.18"/>

  <!-- Label pill — top-left -->
  <rect x="32" y="44" width="130" height="18" rx="9" fill="#b33" fill-opacity="0.10" stroke="#b33" stroke-opacity="0.30" stroke-width="1"/>
  <text x="97" y="56" text-anchor="middle" fill="#b33" class="tag">What Air Canada shipped</text>

  <!-- Flow nodes — centred at x=204 -->
  <!-- Node 1: Customer Question (y=44) -->
  <rect x="130" y="44" width="148" height="28" rx="5" fill="#fff" stroke="#b33" stroke-opacity="0.35" stroke-width="1.2"/>
  <text x="204" y="62" text-anchor="middle" fill="#1a1a18" class="node-label">Customer Question</text>

  <!-- Arrow 1→2 -->
  <line x1="204" y1="72" x2="204" y2="92" stroke="#b33" stroke-opacity="0.6" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <!-- Node 2: LLM (generates from training data) (y=92) -->
  <rect x="116" y="92" width="176" height="28" rx="5" fill="#fff" stroke="#b33" stroke-opacity="0.35" stroke-width="1.2"/>
  <text x="204" y="106" text-anchor="middle" fill="#1a1a18" class="node-label">LLM</text>
  <text x="204" y="118" text-anchor="middle" fill="#b33" class="small">(generates from training data)</text>

  <!-- Arrow 2→3 -->
  <line x1="204" y1="120" x2="204" y2="140" stroke="#b33" stroke-opacity="0.6" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <!-- Node 3: Confident Wrong Answer (y=140) -->
  <rect x="116" y="140" width="176" height="28" rx="5" fill="#fff" stroke="#b33" stroke-opacity="0.35" stroke-width="1.2"/>
  <text x="204" y="158" text-anchor="middle" fill="#b33" class="node-label">Confident Wrong Answer</text>

  <!-- Arrow 3→4 -->
  <line x1="204" y1="168" x2="204" y2="183" stroke="#b33" stroke-opacity="0.6" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <!-- Node 4: No Record (y=183) -->
  <rect x="142" y="183" width="124" height="22" rx="5" fill="#fff" stroke="#b33" stroke-opacity="0.35" stroke-width="1.2"/>
  <text x="204" y="198" text-anchor="middle" fill="#b33" class="node-label">No Record</text>

  <!-- Divider above annotations -->
  <line x1="36" y1="218" x2="372" y2="218" stroke="#b33" stroke-opacity="0.12" stroke-width="1"/>

  <!-- Red annotations — two columns -->
  <text x="38" y="230" fill="#b33" class="annot">&#x2717;  No source grounding</text>
  <text x="38" y="244" fill="#b33" class="annot">&#x2717;  No confidence check</text>
  <text x="210" y="230" fill="#b33" class="annot">&#x2717;  No audit trail</text>
  <text x="210" y="244" fill="#b33" class="annot">&#x2717;  No human fallback</text>

  <!-- Verdict pill -->
  <rect x="54" y="252" width="298" height="18" rx="9" fill="#b33" fill-opacity="0.08" stroke="#b33" stroke-opacity="0.30" stroke-width="1"/>
  <text x="203" y="264" text-anchor="middle" fill="#b33" class="tag">Hallucinated a legal commitment</text>

  <!-- ============================================================ -->
  <!-- RIGHT PANEL — "Production infrastructure" (green-tinted) -->
  <!-- Panel: x=414, y=34, w=366, h=232 -->
  <!-- ============================================================ -->
  <rect x="414" y="34" width="366" height="232" rx="6" fill="#f4fbf6" stroke="#2d7d46" stroke-opacity="0.18"/>

  <!-- Label pill -->
  <rect x="426" y="44" width="148" height="18" rx="9" fill="#2d7d46" fill-opacity="0.10" stroke="#2d7d46" stroke-opacity="0.30" stroke-width="1"/>
  <text x="500" y="56" text-anchor="middle" fill="#2d7d46" class="tag">Production infrastructure</text>

  <!-- Flow nodes — centred at x=597 -->
  <!-- Node 1: Customer Question (y=44) -->
  <rect x="523" y="44" width="148" height="28" rx="5" fill="#fff" stroke="#2d7d46" stroke-opacity="0.35" stroke-width="1.2"/>
  <text x="597" y="62" text-anchor="middle" fill="#1a1a18" class="node-label">Customer Question</text>

  <!-- Arrow 1→2 -->
  <line x1="597" y1="72" x2="597" y2="92" stroke="#2d7d46" stroke-opacity="0.6" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Node 2: Retrieval (verified docs only) (y=92) -->
  <rect x="509" y="92" width="176" height="28" rx="5" fill="#fff" stroke="#2d7d46" stroke-opacity="0.35" stroke-width="1.2"/>
  <text x="597" y="106" text-anchor="middle" fill="#1a1a18" class="node-label">Retrieval</text>
  <text x="597" y="118" text-anchor="middle" fill="#2d7d46" class="small">(verified docs only)</text>

  <!-- Arrow 2→diamond -->
  <line x1="597" y1="120" x2="597" y2="136" stroke="#2d7d46" stroke-opacity="0.6" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Diamond: Confidence Check — centred at (597, 154) -->
  <polygon points="597,136 636,154 597,172 558,154" fill="#fff" stroke="#2d7d46" stroke-opacity="0.45" stroke-width="1.2"/>
  <text x="597" y="158" text-anchor="middle" fill="#1a1a18" class="small" font-weight="600">Confidence?</text>

  <!-- High confidence → right → Sourced Answer + Logged -->
  <line x1="636" y1="154" x2="682" y2="154" stroke="#2d7d46" stroke-opacity="0.7" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="659" y="149" text-anchor="middle" fill="#2d7d46" class="small">high</text>
  <!-- Approved node (y=140, h=28) centred at x=728 -->
  <rect x="682" y="140" width="88" height="28" rx="5" fill="#fff" stroke="#2d7d46" stroke-opacity="0.45" stroke-width="1.2"/>
  <text x="726" y="152" text-anchor="middle" fill="#2d7d46" class="small" font-weight="600">&#x2713; Sourced</text>
  <text x="726" y="164" text-anchor="middle" fill="#2d7d46" class="small" font-weight="600">Answer + Logged</text>

  <!-- Low confidence → down → Connect to agent + Logged -->
  <line x1="597" y1="172" x2="597" y2="192" stroke="#c27a3a" stroke-opacity="0.7" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <text x="612" y="186" fill="#c27a3a" class="small">low</text>
  <!-- Human fallback node (y=192, h=28) -->
  <rect x="509" y="192" width="176" height="28" rx="5" fill="#fff" stroke="#c27a3a" stroke-opacity="0.45" stroke-width="1.2"/>
  <text x="597" y="206" text-anchor="middle" fill="#c27a3a" class="node-label">Connect to agent + Logged</text>

  <!-- Divider above annotations -->
  <line x1="430" y1="234" x2="766" y2="234" stroke="#2d7d46" stroke-opacity="0.12" stroke-width="1"/>

  <!-- Green annotations — two columns -->
  <text x="430" y="248" fill="#2d7d46" class="annot">&#x2713;  Source grounding</text>
  <text x="430" y="262" fill="#2d7d46" class="annot">&#x2713;  Confidence check</text>
  <text x="600" y="248" fill="#2d7d46" class="annot">&#x2713;  Audit trail</text>
  <text x="600" y="262" fill="#2d7d46" class="annot">&#x2713;  Human fallback</text>

</svg>
