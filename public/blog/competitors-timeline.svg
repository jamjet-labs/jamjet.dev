<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" fill="none">
  <style>
    text { font-family: 'Inter', system-ui, sans-serif; }
    .label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
    .title { font-size: 13px; font-weight: 600; }
    .desc { font-size: 11px; }
    .small { font-size: 9.5px; }
  </style>

  <!-- Outer background -->
  <rect width="800" height="240" rx="8" fill="#fafaf8"/>
  <rect x="1" y="1" width="798" height="238" rx="7" stroke="#1a1a18" stroke-opacity="0.08" fill="none"/>

  <!-- Section header -->
  <text x="400" y="28" text-anchor="middle" fill="#8b7355" class="label">Acceleration of AI agent deployments</text>

  <!-- Year markers along bottom -->
  <text x="80" y="192" text-anchor="middle" fill="#8b8578" class="small">2017</text>
  <text x="160" y="192" text-anchor="middle" fill="#8b8578" class="small">2018</text>
  <text x="240" y="192" text-anchor="middle" fill="#8b8578" class="small">2019</text>
  <text x="320" y="192" text-anchor="middle" fill="#8b8578" class="small">2020</text>
  <text x="400" y="192" text-anchor="middle" fill="#8b8578" class="small">2021</text>
  <text x="480" y="192" text-anchor="middle" fill="#8b8578" class="small">2022</text>
  <text x="560" y="192" text-anchor="middle" fill="#8b8578" class="small">2023</text>
  <text x="640" y="192" text-anchor="middle" fill="#8b8578" class="small">2024</text>
  <text x="700" y="192" text-anchor="middle" fill="#8b8578" class="small">2025</text>
  <text x="760" y="192" text-anchor="middle" fill="#8b8578" class="small">2026</text>

  <!-- Year tick marks -->
  <line x1="80" y1="170" x2="80" y2="178" stroke="#1a1a18" stroke-opacity="0.15"/>
  <line x1="160" y1="170" x2="160" y2="178" stroke="#1a1a18" stroke-opacity="0.15"/>
  <line x1="240" y1="170" x2="240" y2="178" stroke="#1a1a18" stroke-opacity="0.15"/>
  <line x1="320" y1="170" x2="320" y2="178" stroke="#1a1a18" stroke-opacity="0.15"/>
  <line x1="400" y1="170" x2="400" y2="178" stroke="#1a1a18" stroke-opacity="0.15"/>
  <line x1="480" y1="170" x2="480" y2="178" stroke="#1a1a18" stroke-opacity="0.15"/>
  <line x1="560" y1="170" x2="560" y2="178" stroke="#1a1a18" stroke-opacity="0.15"/>
  <line x1="640" y1="170" x2="640" y2="178" stroke="#1a1a18" stroke-opacity="0.15"/>
  <line x1="700" y1="170" x2="700" y2="178" stroke="#1a1a18" stroke-opacity="0.15"/>
  <line x1="760" y1="170" x2="760" y2="178" stroke="#1a1a18" stroke-opacity="0.15"/>

  <!-- Main horizontal timeline -->
  <line x1="60" y1="120" x2="775" y2="120" stroke="#1a1a18" stroke-opacity="0.15" stroke-width="2"/>

  <!-- Clustering shading: 2023-2026 acceleration zone -->
  <rect x="540" y="46" width="235" height="148" rx="4" fill="#8b7355" fill-opacity="0.04"/>
  <text x="657" y="60" text-anchor="middle" fill="#8b7355" fill-opacity="0.5" class="small">acceleration zone</text>

  <!-- ===== MILESTONE DOTS AND LABELS ===== -->

  <!-- 1. JPMorgan COiN (2017) — Finance, ABOVE -->
  <circle cx="80" cy="120" r="6" fill="#3b6ea5"/>
  <line x1="80" y1="114" x2="80" y2="88" stroke="#3b6ea5" stroke-opacity="0.3" stroke-width="1"/>
  <text x="80" y="83" text-anchor="middle" fill="#1a1a18" class="small" font-weight="600">JPMorgan COiN</text>
  <text x="80" y="73" text-anchor="middle" fill="#6b6b63" class="small">2017</text>

  <!-- 2. BofA Erica (2018) — Finance, BELOW -->
  <circle cx="160" cy="120" r="6" fill="#3b6ea5"/>
  <line x1="160" y1="126" x2="160" y2="144" stroke="#3b6ea5" stroke-opacity="0.3" stroke-width="1"/>
  <text x="160" y="155" text-anchor="middle" fill="#1a1a18" class="small" font-weight="600">BofA Erica</text>
  <text x="160" y="165" text-anchor="middle" fill="#6b6b63" class="small">2018</text>

  <!-- 3. Morgan Stanley AI (Sep 2023) — Finance, ABOVE -->
  <circle cx="567" cy="120" r="6" fill="#3b6ea5"/>
  <line x1="567" y1="114" x2="567" y2="88" stroke="#3b6ea5" stroke-opacity="0.3" stroke-width="1"/>
  <text x="567" y="83" text-anchor="middle" fill="#1a1a18" class="small" font-weight="600">Morgan Stanley AI</text>
  <text x="567" y="73" text-anchor="middle" fill="#6b6b63" class="small">Sep 2023</text>

  <!-- 4. Klarna AI launch (Jan 2024) — Support, BELOW -->
  <circle cx="644" cy="120" r="6" fill="#c27a3a"/>
  <line x1="644" y1="126" x2="644" y2="144" stroke="#c27a3a" stroke-opacity="0.3" stroke-width="1"/>
  <text x="644" y="155" text-anchor="middle" fill="#1a1a18" class="small" font-weight="600">Klarna AI</text>
  <text x="644" y="165" text-anchor="middle" fill="#6b6b63" class="small">Jan 2024</text>

  <!-- 5. Harvey $3B (Feb 2025) — Legal, ABOVE -->
  <circle cx="704" cy="120" r="6" fill="#2d7d46"/>
  <line x1="704" y1="114" x2="704" y2="88" stroke="#2d7d46" stroke-opacity="0.3" stroke-width="1"/>
  <text x="704" y="83" text-anchor="middle" fill="#1a1a18" class="small" font-weight="600">Harvey $3B</text>
  <text x="704" y="73" text-anchor="middle" fill="#6b6b63" class="small">Feb 2025</text>

  <!-- 6. Lemonade 55% (2025) — Insurance, BELOW -->
  <circle cx="720" cy="120" r="6" fill="#7b5ea7"/>
  <line x1="720" y1="126" x2="720" y2="144" stroke="#7b5ea7" stroke-opacity="0.3" stroke-width="1"/>
  <text x="722" y="155" text-anchor="middle" fill="#1a1a18" class="small" font-weight="600">Lemonade 55%</text>
  <text x="722" y="165" text-anchor="middle" fill="#6b6b63" class="small">2025</text>

  <!-- 7. Goldman Claude agents (Feb 2026) — Finance, ABOVE -->
  <circle cx="762" cy="120" r="6" fill="#3b6ea5"/>
  <line x1="762" y1="114" x2="762" y2="88" stroke="#3b6ea5" stroke-opacity="0.3" stroke-width="1"/>
  <text x="762" y="83" text-anchor="middle" fill="#1a1a18" class="small" font-weight="600">Goldman Claude</text>
  <text x="762" y="73" text-anchor="middle" fill="#6b6b63" class="small">Feb 2026</text>

  <!-- Legend (bottom-right) -->
  <rect x="580" y="204" width="200" height="28" rx="4" fill="#fff" stroke="#1a1a18" stroke-opacity="0.08"/>
  <circle cx="596" cy="218" r="4" fill="#3b6ea5"/>
  <text x="604" y="221" fill="#6b6b63" class="small">Finance</text>
  <circle cx="646" cy="218" r="4" fill="#2d7d46"/>
  <text x="654" y="221" fill="#6b6b63" class="small">Legal</text>
  <circle cx="690" cy="218" r="4" fill="#c27a3a"/>
  <text x="698" y="221" fill="#6b6b63" class="small">Support</text>
  <circle cx="742" cy="218" r="4" fill="#7b5ea7"/>
  <text x="750" y="221" fill="#6b6b63" class="small">Insurance</text>

</svg>