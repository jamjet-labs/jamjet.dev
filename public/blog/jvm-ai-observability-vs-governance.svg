<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" fill="none">
  <style>
    text { font-family: 'Inter', system-ui, sans-serif; }
    .label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
    .node-label { font-size: 10.5px; font-weight: 600; }
    .tag { font-size: 9px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
    .annot { font-size: 9.5px; }
    .divider { font-size: 8.5px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
  </style>

  <!-- Outer background -->
  <rect width="800" height="320" rx="8" fill="#fafaf8"/>
  <rect x="1" y="1" width="798" height="318" rx="7" stroke="#1a1a18" stroke-opacity="0.08" fill="none"/>

  <!-- Section header -->
  <text x="400" y="24" text-anchor="middle" fill="#8b7355" class="label">JVM AI: a built floor, a missing wall</text>

  <!-- ===================== LEFT: Observability (green, owned) ===================== -->
  <rect x="16" y="36" width="370" height="270" rx="6" fill="#f4fbf6" stroke="#2d7d46" stroke-opacity="0.18"/>

  <rect x="28" y="48" width="150" height="18" rx="9" fill="#2d7d46" fill-opacity="0.10" stroke="#2d7d46" stroke-opacity="0.30"/>
  <text x="103" y="60" text-anchor="middle" fill="#2d7d46" class="tag">Observability — owned</text>

  <!-- shipped capability nodes (solid, with check) -->
  <g>
    <rect x="40" y="78" width="322" height="28" rx="5" fill="#fff" stroke="#2d7d46" stroke-opacity="0.45" stroke-width="1.2"/>
    <circle cx="58" cy="92" r="7" fill="#2d7d46" fill-opacity="0.12"/>
    <path d="M54.5 92 l2.5 2.5 l4.5 -5" stroke="#2d7d46" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="74" y="96" fill="#1a1a18" class="node-label">OpenTelemetry GenAI conventions</text>
  </g>
  <g>
    <rect x="40" y="112" width="322" height="28" rx="5" fill="#fff" stroke="#2d7d46" stroke-opacity="0.45" stroke-width="1.2"/>
    <circle cx="58" cy="126" r="7" fill="#2d7d46" fill-opacity="0.12"/>
    <path d="M54.5 126 l2.5 2.5 l4.5 -5" stroke="#2d7d46" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="74" y="130" fill="#1a1a18" class="node-label">Spring AI: native, GA on Micrometer</text>
  </g>
  <g>
    <rect x="40" y="146" width="322" height="28" rx="5" fill="#fff" stroke="#2d7d46" stroke-opacity="0.45" stroke-width="1.2"/>
    <circle cx="58" cy="160" r="7" fill="#2d7d46" fill-opacity="0.12"/>
    <path d="M54.5 160 l2.5 2.5 l4.5 -5" stroke="#2d7d46" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="74" y="164" fill="#1a1a18" class="node-label">Quarkus LangChain4j: zero-config</text>
  </g>
  <g>
    <rect x="40" y="180" width="322" height="28" rx="5" fill="#fff" stroke="#2d7d46" stroke-opacity="0.45" stroke-width="1.2"/>
    <circle cx="58" cy="194" r="7" fill="#2d7d46" fill-opacity="0.12"/>
    <path d="M54.5 194 l2.5 2.5 l4.5 -5" stroke="#2d7d46" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="74" y="198" fill="#1a1a18" class="node-label">Token usage + latency metrics</text>
  </g>
  <g>
    <rect x="40" y="214" width="322" height="28" rx="5" fill="#fff" stroke="#2d7d46" stroke-opacity="0.45" stroke-width="1.2"/>
    <circle cx="58" cy="228" r="7" fill="#2d7d46" fill-opacity="0.12"/>
    <path d="M54.5 228 l2.5 2.5 l4.5 -5" stroke="#2d7d46" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="74" y="232" fill="#1a1a18" class="node-label">Any OTLP backend (e.g. Langfuse)</text>
  </g>

  <text x="201" y="262" text-anchor="middle" fill="#2d7d46" class="annot">Standardized, GA, and adopted.</text>
  <rect x="80" y="272" width="242" height="20" rx="10" fill="#2d7d46" fill-opacity="0.08" stroke="#2d7d46" stroke-opacity="0.28"/>
  <text x="201" y="285" text-anchor="middle" fill="#2d7d46" class="tag">Adopt the standard</text>

  <!-- ===================== RIGHT: Governance (amber, hooks) ===================== -->
  <rect x="414" y="36" width="370" height="270" rx="6" fill="#fdf8f0" stroke="#b45309" stroke-opacity="0.18"/>

  <rect x="426" y="48" width="196" height="18" rx="9" fill="#b45309" fill-opacity="0.10" stroke="#b45309" stroke-opacity="0.30"/>
  <text x="524" y="60" text-anchor="middle" fill="#b45309" class="tag">Governance — hooks, not a layer</text>

  <!-- what exists: hooks (solid amber) -->
  <text x="438" y="84" fill="#b45309" fill-opacity="0.75" class="divider">Hooks that exist</text>
  <g>
    <rect x="438" y="90" width="324" height="26" rx="5" fill="#fff" stroke="#b45309" stroke-opacity="0.45" stroke-width="1.2"/>
    <text x="600" y="106" text-anchor="middle" fill="#1a1a18" class="node-label">Spring AI advisors (interception substrate)</text>
  </g>
  <g>
    <rect x="438" y="120" width="324" height="26" rx="5" fill="#fff" stroke="#b45309" stroke-opacity="0.45" stroke-width="1.2"/>
    <text x="600" y="136" text-anchor="middle" fill="#1a1a18" class="node-label">LangChain4j guardrails (beta, ~2 built-ins)</text>
  </g>

  <!-- what you build: not shipped (dashed amber) -->
  <text x="438" y="166" fill="#b45309" fill-opacity="0.75" class="divider">What you still build yourself</text>
  <g>
    <rect x="438" y="172" width="156" height="26" rx="5" fill="#fdf8f0" stroke="#b45309" stroke-opacity="0.5" stroke-width="1.2" stroke-dasharray="4 3"/>
    <text x="516" y="188" text-anchor="middle" fill="#b45309" class="node-label">Budget enforcement</text>
  </g>
  <g>
    <rect x="606" y="172" width="156" height="26" rx="5" fill="#fdf8f0" stroke="#b45309" stroke-opacity="0.5" stroke-width="1.2" stroke-dasharray="4 3"/>
    <text x="684" y="188" text-anchor="middle" fill="#b45309" class="node-label">Audit trail</text>
  </g>
  <g>
    <rect x="438" y="202" width="156" height="26" rx="5" fill="#fdf8f0" stroke="#b45309" stroke-opacity="0.5" stroke-width="1.2" stroke-dasharray="4 3"/>
    <text x="516" y="218" text-anchor="middle" fill="#b45309" class="node-label">PII redaction</text>
  </g>
  <g>
    <rect x="606" y="202" width="156" height="26" rx="5" fill="#fdf8f0" stroke="#b45309" stroke-opacity="0.5" stroke-width="1.2" stroke-dasharray="4 3"/>
    <text x="684" y="218" text-anchor="middle" fill="#b45309" class="node-label">Human-in-the-loop</text>
  </g>
  <g>
    <rect x="522" y="232" width="156" height="26" rx="5" fill="#fdf8f0" stroke="#b45309" stroke-opacity="0.5" stroke-width="1.2" stroke-dasharray="4 3"/>
    <text x="600" y="248" text-anchor="middle" fill="#b45309" class="node-label">Content moderation</text>
  </g>

  <rect x="479" y="272" width="240" height="20" rx="10" fill="#b45309" fill-opacity="0.08" stroke="#b45309" stroke-opacity="0.28"/>
  <text x="599" y="285" text-anchor="middle" fill="#b45309" class="tag">Mostly your code</text>
</svg>
