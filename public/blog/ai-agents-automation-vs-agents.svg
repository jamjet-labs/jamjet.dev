<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" fill="none">
  <style>
    text { font-family: 'Inter', system-ui, sans-serif; }
    .label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
    .title { font-size: 13px; font-weight: 600; }
    .desc { font-size: 11px; }
    .small { font-size: 9.5px; }
  </style>

  <!-- Background -->
  <rect width="800" height="350" rx="8" fill="#fafaf8"/>
  <rect x="1" y="1" width="798" height="348" rx="7" stroke="#1a1a18" stroke-opacity="0.08" fill="none"/>

  <!-- Section labels -->
  <text x="200" y="30" text-anchor="middle" class="label" fill="#6b6b63">Traditional Automation</text>
  <text x="600" y="30" text-anchor="middle" class="label" fill="#8b7355">AI Agent Workflow</text>

  <!-- Vertical divider -->
  <line x1="400" y1="14" x2="400" y2="336" stroke="#1a1a18" stroke-opacity="0.10" stroke-dasharray="4 4"/>

  <!-- ============================================================ -->
  <!-- LEFT SIDE: Traditional Automation -->
  <!-- ============================================================ -->

  <!-- START node -->
  <rect x="155" y="45" width="90" height="30" rx="15" fill="#fff" stroke="#1a1a18" stroke-opacity="0.18"/>
  <text x="200" y="64" text-anchor="middle" class="desc" fill="#1a1a18" font-weight="600">Start</text>

  <!-- Arrow: Start → Process 1 -->
  <line x1="200" y1="75" x2="200" y2="93" stroke="#6b6b63" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- Process 1 -->
  <rect x="143" y="93" width="114" height="30" rx="5" fill="#fff" stroke="#1a1a18" stroke-opacity="0.14"/>
  <text x="200" y="112" text-anchor="middle" class="desc" fill="#1a1a18">Fetch Data</text>

  <!-- Arrow: Process 1 → Diamond -->
  <line x1="200" y1="123" x2="200" y2="141" stroke="#6b6b63" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- Diamond decision node -->
  <polygon points="200,141 240,165 200,189 160,165" fill="#fff" stroke="#1a1a18" stroke-opacity="0.18"/>
  <text x="200" y="163" text-anchor="middle" class="small" fill="#1a1a18">Valid?</text>
  <text x="200" y="174" text-anchor="middle" class="small" fill="#6b6b63">Yes / No</text>

  <!-- Yes branch (right) -->
  <line x1="240" y1="165" x2="270" y2="165" stroke="#6b6b63" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <text x="252" y="160" text-anchor="middle" class="small" fill="#2d7d46">Yes</text>
  <!-- Process 2 (right) -->
  <rect x="270" y="150" width="90" height="30" rx="5" fill="#fff" stroke="#1a1a18" stroke-opacity="0.14"/>
  <text x="315" y="169" text-anchor="middle" class="desc" fill="#1a1a18">Process</text>

  <!-- Arrow: Process 2 → End -->
  <line x1="315" y1="180" x2="315" y2="210" stroke="#6b6b63" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <rect x="271" y="210" width="88" height="30" rx="15" fill="#fff" stroke="#1a1a18" stroke-opacity="0.18"/>
  <text x="315" y="229" text-anchor="middle" class="desc" fill="#1a1a18" font-weight="600">End</text>

  <!-- No branch (left — failure path) -->
  <line x1="160" y1="165" x2="100" y2="165" stroke="#c45a3c" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow-red)"/>
  <text x="130" y="160" text-anchor="middle" class="small" fill="#c45a3c">No</text>

  <!-- Failure terminal (red X) -->
  <rect x="60" y="150" width="40" height="30" rx="5" fill="#fff" stroke="#c45a3c" stroke-opacity="0.7"/>
  <!-- X mark -->
  <line x1="70" y1="158" x2="90" y2="178" stroke="#c45a3c" stroke-width="2"/>
  <line x1="90" y1="158" x2="70" y2="178" stroke="#c45a3c" stroke-width="2"/>

  <!-- "Stops here" label -->
  <text x="80" y="197" text-anchor="middle" class="small" fill="#c45a3c">Stops here</text>

  <!-- Bottom caption left -->
  <rect x="90" y="268" width="218" height="38" rx="5" fill="#fff" stroke="#1a1a18" stroke-opacity="0.10"/>
  <text x="199" y="284" text-anchor="middle" class="small" fill="#6b6b63">Fixed paths, no recovery</text>
  <text x="199" y="298" text-anchor="middle" class="small" fill="#8b8578">Failure = full restart</text>

  <!-- ============================================================ -->
  <!-- RIGHT SIDE: AI Agent Workflow -->
  <!-- ============================================================ -->

  <!-- Durable foundation bar -->
  <rect x="420" y="280" width="360" height="42" rx="6" fill="#8b7355" fill-opacity="0.08" stroke="#8b7355" stroke-opacity="0.30"/>
  <text x="600" y="296" text-anchor="middle" class="small" fill="#8b7355" font-weight="600" letter-spacing="0.03em">Checkpoint</text>
  <text x="600" y="296" text-anchor="middle" class="small" fill="#8b7355" font-weight="600" letter-spacing="0.03em">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;·&#160;Recovery&#160;·&#160;Audit Trail</text>
  <text x="600" y="296" text-anchor="middle" class="small" fill="#8b7355" font-weight="600">Checkpoint · Recovery · Audit Trail</text>
  <text x="600" y="312" text-anchor="middle" class="small" fill="#8b7355" fill-opacity="0.7">Durable Layer</text>

  <!-- Agent node 1: Plan -->
  <rect x="430" y="45" width="100" height="44" rx="6" fill="#fff" stroke="#8b7355" stroke-opacity="0.40"/>
  <!-- Brain glow -->
  <circle cx="450" cy="67" r="9" fill="#8b7355" fill-opacity="0.12"/>
  <text x="450" y="71" text-anchor="middle" font-size="11" fill="#8b7355">&#9679;</text>
  <text x="480" y="60" text-anchor="middle" class="desc" fill="#1a1a18" font-weight="600">Plan</text>
  <text x="480" y="76" text-anchor="middle" class="small" fill="#6b6b63">Reasons</text>

  <!-- Agent node 2: Fetch -->
  <rect x="548" y="45" width="100" height="44" rx="6" fill="#fff" stroke="#8b7355" stroke-opacity="0.40"/>
  <circle cx="568" cy="67" r="9" fill="#8b7355" fill-opacity="0.12"/>
  <text x="568" y="71" text-anchor="middle" font-size="11" fill="#8b7355">&#9679;</text>
  <text x="598" y="60" text-anchor="middle" class="desc" fill="#1a1a18" font-weight="600">Fetch</text>
  <text x="598" y="76" text-anchor="middle" class="small" fill="#6b6b63">Adapts</text>

  <!-- Curved arrow: Plan → Fetch -->
  <path d="M530,67 C538,55 542,55 548,67" stroke="#8b7355" stroke-opacity="0.6" stroke-width="1.5" fill="none" marker-end="url(#arrow-brown)"/>

  <!-- Agent node 3: Decide (center, below) -->
  <rect x="489" y="130" width="122" height="44" rx="6" fill="#fff" stroke="#8b7355" stroke-opacity="0.40"/>
  <circle cx="509" cy="152" r="9" fill="#8b7355" fill-opacity="0.12"/>
  <text x="509" y="156" text-anchor="middle" font-size="11" fill="#8b7355">&#9679;</text>
  <text x="551" y="145" text-anchor="middle" class="desc" fill="#1a1a18" font-weight="600">Decide</text>
  <text x="551" y="161" text-anchor="middle" class="small" fill="#6b6b63">Recovers</text>

  <!-- Curved arrow: Plan → Decide -->
  <path d="M480,89 C478,110 492,118 500,130" stroke="#8b7355" stroke-opacity="0.5" stroke-width="1.5" fill="none" marker-end="url(#arrow-brown)"/>

  <!-- Curved arrow: Fetch → Decide -->
  <path d="M598,89 C600,108 566,118 560,130" stroke="#8b7355" stroke-opacity="0.5" stroke-width="1.5" fill="none" marker-end="url(#arrow-brown)"/>

  <!-- Agent node 4: Act -->
  <rect x="489" y="205" width="122" height="44" rx="6" fill="#fff" stroke="#8b7355" stroke-opacity="0.40"/>
  <circle cx="509" cy="227" r="9" fill="#8b7355" fill-opacity="0.12"/>
  <text x="509" y="231" text-anchor="middle" font-size="11" fill="#8b7355">&#9679;</text>
  <text x="551" y="220" text-anchor="middle" class="desc" fill="#1a1a18" font-weight="600">Act</text>
  <text x="551" y="236" text-anchor="middle" class="small" fill="#6b6b63">Checkpoint saved</text>

  <!-- Arrow: Decide → Act -->
  <path d="M550,174 C550,185 550,193 550,205" stroke="#8b7355" stroke-opacity="0.6" stroke-width="1.5" fill="none" marker-end="url(#arrow-brown)"/>

  <!-- Crash indicator on Act node -->
  <circle cx="600" cy="227" r="7" fill="#c45a3c" fill-opacity="0.15" stroke="#c45a3c" stroke-opacity="0.5"/>
  <text x="600" y="231" text-anchor="middle" font-size="9" fill="#c45a3c" font-weight="700">!</text>

  <!-- Recovery arrow from durable layer back up to Act -->
  <path d="M680,280 C700,270 720,250 700,227 C690,215 625,220 612,227" stroke="#2d7d46" stroke-opacity="0.7" stroke-width="1.5" stroke-dasharray="4 3" fill="none" marker-end="url(#arrow-green)"/>
  <text x="718" y="258" text-anchor="middle" class="small" fill="#2d7d46">Resume</text>

  <!-- Property badges: Reasons, Adapts, Recovers -->
  <rect x="421" y="14" width="54" height="18" rx="9" fill="#8b7355" fill-opacity="0.12" stroke="#8b7355" stroke-opacity="0.3"/>
  <text x="448" y="27" text-anchor="middle" class="small" fill="#8b7355" font-weight="600">Reasons</text>

  <rect x="481" y="14" width="46" height="18" rx="9" fill="#8b7355" fill-opacity="0.12" stroke="#8b7355" stroke-opacity="0.3"/>
  <text x="504" y="27" text-anchor="middle" class="small" fill="#8b7355" font-weight="600">Adapts</text>

  <rect x="533" y="14" width="56" height="18" rx="9" fill="#8b7355" fill-opacity="0.12" stroke="#8b7355" stroke-opacity="0.3"/>
  <text x="561" y="27" text-anchor="middle" class="small" fill="#8b7355" font-weight="600">Recovers</text>

  <!-- Bottom caption right -->
  <rect x="420" y="326" width="360" height="10" rx="3" fill="none"/>
  <text x="600" y="336" text-anchor="middle" class="small" fill="#6b6b63">Flexible reasoning, crash-safe</text>

  <!-- ============================================================ -->
  <!-- ARROW MARKERS -->
  <!-- ============================================================ -->
  <defs>
    <marker id="arrow-gray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6b6b63" fill-opacity="0.7"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c45a3c" fill-opacity="0.8"/>
    </marker>
    <marker id="arrow-brown" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8b7355" fill-opacity="0.8"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2d7d46" fill-opacity="0.8"/>
    </marker>
  </defs>

</svg>
