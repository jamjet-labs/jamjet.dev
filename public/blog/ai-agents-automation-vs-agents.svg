<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" fill="none">
  <style>
    text { font-family: 'Inter', system-ui, sans-serif; }
    .label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
    .title { font-size: 13px; font-weight: 600; }
    .desc { font-size: 11px; }
    .small { font-size: 9.5px; }
  </style>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow-gray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6b6b63" fill-opacity="0.7"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c45a3c" fill-opacity="0.8"/>
    </marker>
    <marker id="arrow-brown" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8b7355" fill-opacity="0.8"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2d7d46" fill-opacity="0.8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="380" rx="8" fill="#fafaf8"/>
  <rect x="1" y="1" width="798" height="378" rx="7" stroke="#1a1a18" stroke-opacity="0.08" fill="none"/>

  <!-- Vertical divider -->
  <line x1="400" y1="14" x2="400" y2="366" stroke="#1a1a18" stroke-opacity="0.10" stroke-dasharray="4 4"/>

  <!-- ============================================================ -->
  <!-- LEFT SIDE: Traditional Automation -->
  <!-- ============================================================ -->

  <text x="200" y="30" text-anchor="middle" class="label" fill="#6b6b63">Traditional Automation</text>

  <!-- START node -->
  <rect x="155" y="50" width="90" height="30" rx="15" fill="#fff" stroke="#1a1a18" stroke-opacity="0.18"/>
  <text x="200" y="69" text-anchor="middle" class="desc" fill="#1a1a18" font-weight="600">Start</text>

  <!-- Arrow -->
  <line x1="200" y1="80" x2="200" y2="100" stroke="#6b6b63" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- Fetch Data -->
  <rect x="143" y="100" width="114" height="30" rx="5" fill="#fff" stroke="#1a1a18" stroke-opacity="0.14"/>
  <text x="200" y="119" text-anchor="middle" class="desc" fill="#1a1a18">Fetch Data</text>

  <!-- Arrow -->
  <line x1="200" y1="130" x2="200" y2="150" stroke="#6b6b63" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- Diamond decision -->
  <polygon points="200,150 240,175 200,200 160,175" fill="#fff" stroke="#1a1a18" stroke-opacity="0.18"/>
  <text x="200" y="174" text-anchor="middle" class="small" fill="#1a1a18">Valid?</text>

  <!-- Yes branch (right) -->
  <line x1="240" y1="175" x2="275" y2="175" stroke="#6b6b63" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <text x="255" y="168" text-anchor="middle" class="small" fill="#2d7d46">Yes</text>

  <!-- Process -->
  <rect x="275" y="160" width="90" height="30" rx="5" fill="#fff" stroke="#1a1a18" stroke-opacity="0.14"/>
  <text x="320" y="179" text-anchor="middle" class="desc" fill="#1a1a18">Process</text>

  <!-- Arrow to End -->
  <line x1="320" y1="190" x2="320" y2="220" stroke="#6b6b63" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- End -->
  <rect x="275" y="220" width="90" height="30" rx="15" fill="#fff" stroke="#1a1a18" stroke-opacity="0.18"/>
  <text x="320" y="239" text-anchor="middle" class="desc" fill="#1a1a18" font-weight="600">End</text>

  <!-- No branch (left — failure) -->
  <line x1="160" y1="175" x2="100" y2="175" stroke="#c45a3c" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow-red)"/>
  <text x="132" y="168" text-anchor="middle" class="small" fill="#c45a3c">No</text>

  <!-- Failure X -->
  <rect x="60" y="160" width="40" height="30" rx="5" fill="#fff" stroke="#c45a3c" stroke-opacity="0.7"/>
  <line x1="70" y1="168" x2="90" y2="183" stroke="#c45a3c" stroke-width="2"/>
  <line x1="90" y1="168" x2="70" y2="183" stroke="#c45a3c" stroke-width="2"/>
  <text x="80" y="207" text-anchor="middle" class="small" fill="#c45a3c">Stops here</text>

  <!-- Bottom caption left -->
  <rect x="90" y="290" width="218" height="38" rx="5" fill="#fff" stroke="#1a1a18" stroke-opacity="0.10"/>
  <text x="199" y="306" text-anchor="middle" class="small" fill="#6b6b63">Fixed paths, no recovery</text>
  <text x="199" y="320" text-anchor="middle" class="small" fill="#8b8578">Failure = full restart</text>

  <!-- ============================================================ -->
  <!-- RIGHT SIDE: AI Agent Workflow -->
  <!-- ============================================================ -->

  <text x="600" y="30" text-anchor="middle" class="label" fill="#8b7355">AI Agent Workflow</text>

  <!-- Property badges -->
  <rect x="480" y="40" width="56" height="18" rx="9" fill="#8b7355" fill-opacity="0.12" stroke="#8b7355" stroke-opacity="0.3"/>
  <text x="508" y="53" text-anchor="middle" class="small" fill="#8b7355" font-weight="600">Reasons</text>

  <rect x="542" y="40" width="48" height="18" rx="9" fill="#8b7355" fill-opacity="0.12" stroke="#8b7355" stroke-opacity="0.3"/>
  <text x="566" y="53" text-anchor="middle" class="small" fill="#8b7355" font-weight="600">Adapts</text>

  <rect x="596" y="40" width="60" height="18" rx="9" fill="#8b7355" fill-opacity="0.12" stroke="#8b7355" stroke-opacity="0.3"/>
  <text x="626" y="53" text-anchor="middle" class="small" fill="#8b7355" font-weight="600">Recovers</text>

  <!-- Agent node 1: Plan -->
  <rect x="440" y="74" width="100" height="44" rx="6" fill="#fff" stroke="#8b7355" stroke-opacity="0.40"/>
  <circle cx="460" cy="96" r="8" fill="#8b7355" fill-opacity="0.15"/>
  <circle cx="460" cy="96" r="3" fill="#8b7355"/>
  <text x="494" y="92" text-anchor="middle" class="desc" fill="#1a1a18" font-weight="600">Plan</text>
  <text x="494" y="106" text-anchor="middle" class="small" fill="#6b6b63">Reasons</text>

  <!-- Agent node 2: Fetch -->
  <rect x="660" y="74" width="100" height="44" rx="6" fill="#fff" stroke="#8b7355" stroke-opacity="0.40"/>
  <circle cx="680" cy="96" r="8" fill="#8b7355" fill-opacity="0.15"/>
  <circle cx="680" cy="96" r="3" fill="#8b7355"/>
  <text x="714" y="92" text-anchor="middle" class="desc" fill="#1a1a18" font-weight="600">Fetch</text>
  <text x="714" y="106" text-anchor="middle" class="small" fill="#6b6b63">Adapts</text>

  <!-- Arrow: Plan → Decide -->
  <path d="M490,118 C490,138 530,148 540,155" stroke="#8b7355" stroke-opacity="0.5" stroke-width="1.5" fill="none" marker-end="url(#arrow-brown)"/>

  <!-- Arrow: Fetch → Decide -->
  <path d="M710,118 C710,138 670,148 660,155" stroke="#8b7355" stroke-opacity="0.5" stroke-width="1.5" fill="none" marker-end="url(#arrow-brown)"/>

  <!-- Agent node 3: Decide -->
  <rect x="539" y="155" width="122" height="44" rx="6" fill="#fff" stroke="#8b7355" stroke-opacity="0.40"/>
  <circle cx="559" cy="177" r="8" fill="#8b7355" fill-opacity="0.15"/>
  <circle cx="559" cy="177" r="3" fill="#8b7355"/>
  <text x="604" y="173" text-anchor="middle" class="desc" fill="#1a1a18" font-weight="600">Decide</text>
  <text x="604" y="187" text-anchor="middle" class="small" fill="#6b6b63">Reasons</text>

  <!-- Arrow: Decide → Act -->
  <line x1="600" y1="199" x2="600" y2="228" stroke="#8b7355" stroke-opacity="0.6" stroke-width="1.5" marker-end="url(#arrow-brown)"/>

  <!-- Agent node 4: Act -->
  <rect x="539" y="228" width="122" height="44" rx="6" fill="#fff" stroke="#8b7355" stroke-opacity="0.40"/>
  <circle cx="559" cy="250" r="8" fill="#8b7355" fill-opacity="0.15"/>
  <circle cx="559" cy="250" r="3" fill="#8b7355"/>
  <text x="604" y="246" text-anchor="middle" class="desc" fill="#1a1a18" font-weight="600">Act</text>
  <text x="604" y="260" text-anchor="middle" class="small" fill="#6b6b63">Checkpoint saved</text>

  <!-- Crash indicator -->
  <circle cx="650" cy="250" r="7" fill="#c45a3c" fill-opacity="0.15" stroke="#c45a3c" stroke-opacity="0.5"/>
  <text x="650" y="254" text-anchor="middle" font-size="9" fill="#c45a3c" font-weight="700">!</text>

  <!-- Durable foundation bar -->
  <rect x="430" y="300" width="340" height="36" rx="6" fill="#8b7355" fill-opacity="0.08" stroke="#8b7355" stroke-opacity="0.30"/>
  <text x="600" y="318" text-anchor="middle" class="small" fill="#8b7355" font-weight="600">Checkpoint  ·  Recovery  ·  Audit Trail</text>
  <text x="600" y="330" text-anchor="middle" class="small" fill="#8b7355" fill-opacity="0.6">Durable Layer</text>

  <!-- Recovery arrow from durable layer back up to Act -->
  <path d="M730,300 C745,285 750,265 730,250 C720,242 665,245 655,250" stroke="#2d7d46" stroke-opacity="0.6" stroke-width="1.5" stroke-dasharray="4 3" fill="none" marker-end="url(#arrow-green)"/>
  <text x="752" y="275" text-anchor="start" class="small" fill="#2d7d46">Resume</text>

  <!-- Bottom caption right -->
  <text x="600" y="358" text-anchor="middle" class="small" fill="#6b6b63">Flexible reasoning, crash-safe</text>

</svg>
